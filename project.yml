name: NearNote
options:
  bundleIdPrefix: com.mosaab.NearNote
  createSharedSchemes: true
targets:
  NearNote:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NearNote
    settings:
      INFOPLIST_FILE: NearNote/Info.plist
      CODE_SIGN_ENTITLEMENTS: NearNote/NearNote.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: com.mosaab.NearNote
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GOOGLE_PLACES_API_KEY: ""
      NEARNOTE_TELEMETRY_ENDPOINT: ""
      NEARNOTE_FEEDBACK_ENDPOINT: ""
      NEARNOTE_PRIVACY_URL: "https://joevenner.github.io/moments-hq/privacy"
      NEARNOTE_SUPPORT_URL: "https://joevenner.github.io/moments-hq/support"
    dependencies:
      - target: NearNoteWidget
  NearNoteWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NearNoteWidget
      - path: NearNote/Models
      - path: NearNote/Services/ReminderStore.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.mosaab.NearNote.NearNoteWidget
      CODE_SIGN_ENTITLEMENTS: NearNoteWidget/NearNoteWidget.entitlements
    info:
      path: NearNoteWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  NearNoteTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NearNoteTests
    dependencies:
      - target: NearNote
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.mosaab.NearNoteTests
schemes:
  NearNote:
    build:
      targets:
        NearNote: all
        NearNoteWidget: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - NearNoteTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
